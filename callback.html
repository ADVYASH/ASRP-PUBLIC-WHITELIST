<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
</head>
<body>

<h2>Logging in...</h2>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if (!code) {
  document.body.innerHTML = "❌ No code received";
}

// DEBUG SHOW
document.body.innerHTML = "Code received...<br>Loading user...";

// 🔥 CALL WORKER
fetch("https://aged-hat-98f0.mradvocate2326.workers.dev/auth?code=" + code)
.then(async res => {
  const text = await res.text();

  try {
    return JSON.parse(text);
  } catch {
    throw new Error("Invalid JSON: " + text);
  }
})
.then(user => {

  // ❌ if error returned
  if (user.message) {
    document.body.innerHTML = "❌ Error: " + user.message;
    return;
  }

  // ✅ SUCCESS → SHOW FORM
  document.body.innerHTML = `
    <h2>Welcome ${user.username}</h2>

    <form id="form">
      <input required placeholder="Minecraft Username" id="mc"><br><br>

      <select id="version">
        <option>Java</option>
        <option>Bedrock</option>
        <option>Cracked</option>
      </select><br><br>

      <input required placeholder="Real Name" id="real"><br><br>

      <label>Follow ASRP Rules?</label><br>
      <select id="rules">
        <option>Yes</option>
        <option>No</option>
      </select><br><br>

      <button type="submit">Submit</button>
    </form>
  `;

  document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    await fetch("https://aged-hat-98f0.mradvocate2326.workers.dev/submit", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        user,
        mc: document.getElementById("mc").value,
        version: document.getElementById("version").value,
        real: document.getElementById("real").value,
        rules: document.getElementById("rules").value
      })
    });

    document.body.innerHTML = "<h2>✅ Submitted Successfully</h2>";
  };

})
.catch(err => {
  document.body.innerHTML = "❌ Fetch Error: " + err;
});
</script>
</body>
</html>
